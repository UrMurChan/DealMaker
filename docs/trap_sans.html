<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Санс / Неправильный путь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }
        /* Синее свечение фона */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001133, #000000);
            z-index: -2;
        }
        /* Падающие кости */
        .bone {
            position: absolute;
            background: #dcdcdc;
            width: 8px;
            height: 40px;
            border-radius: 4px;
            transform: rotate(45deg);
            opacity: 0.5;
            animation: fall 2.5s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        /* Контейнер Санса — изначально невидим */
        .sans-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #0088ff;
            box-shadow: 0 0 30px #0088ff;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2.5s ease-out forwards;
            animation-delay: 0.5s; /* небольшая задержка перед появлением */
        }
        /* Анимация проявления */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }
        /* Лицо Санса (можно заменить на картинку) */
        .sans-face {
            font-size: 5rem;
            line-height: 1;
            filter: drop-shadow(0 0 8px cyan);
            margin-bottom: 20px;
        }
        /* Анимированный глаз */
        .eye {
            display: inline-block;
            animation: eyeGlow 0.8s infinite alternate;
            font-size: 4rem;
        }
        @keyframes eyeGlow {
            0% { text-shadow: 0 0 0 cyan; opacity: 0.7; }
            100% { text-shadow: 0 0 20px cyan, 0 0 5px white; opacity: 1; }
        }
        .message {
            font-size: 1.2rem;
            margin: 20px 0;
            border-left: 3px solid #0088ff;
            padding-left: 20px;
        }
        .timer {
            font-size: 0.9rem;
            color: #88aaff;
            margin-top: 20px;
        }
        button {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #0088ff;
            color: #0088ff;
            padding: 8px 20px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 30px;
        }
        button:hover {
            background: #0088ff;
            color: black;
        }
    </style>
</head>
<body>
    <!-- Контейнер для падающих костей -->
    <div id="bones-container"></div>

    <div class="sans-container" id="sansContainer">
        <div class="sans-face">
            <img src="images/sans.gif" alt="Санс" style="width: 250px; display: block; margin: 0 auto;">
        </div>
        <div class="message">
            хе-хе... Дружище, я смотрю ты шутник.<br>
            Не стоит играться с этими словами.<br>
            Начинай сначала. По правильному.<br>
			Я знаю где ты живёшь...
        </div>
        <div class="timer" id="timer">возврат через 3 секунды</div>
        <button id="nowBtn">начать заново сейчас</button>
    </div>

    <audio id="sansSound" autoplay loop>
        <source src="music/megalovania.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Генерация костей
        const bonesContainer = document.getElementById('bones-container');
        for (let i = 0; i < 20; i++) {
            let bone = document.createElement('div');
            bone.classList.add('bone');
            bone.style.left = Math.random() * 100 + '%';
            bone.style.animationDelay = Math.random() * 2 + 's';
            bone.style.animationDuration = 1.5 + Math.random() * 2 + 's';
            bone.style.width = 4 + Math.random() * 8 + 'px';
            bone.style.height = 20 + Math.random() * 30 + 'px';
            bonesContainer.appendChild(bone);
        }

        // Звук
        const audio = document.getElementById('sansSound');
        audio.volume = 0.25;
        audio.play().catch(e => console.log("Нет звука для Санса"));

        // Таймер 3 секунды
        let seconds = 10;
        const timerDiv = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerDiv.innerHTML = `возврат через ${seconds} секунд${seconds === 1 ? 'у' : 'ы'}`;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.replace("index.html");
            }
        }, 1000);

        // Кнопка немедленного возврата
        document.getElementById('nowBtn').addEventListener('click', () => {
            clearInterval(interval);
            window.location.replace("index.html");
        });
    </script>
</body>
</html>
