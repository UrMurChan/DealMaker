<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение к сети Тёмного мира</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы текст не выделялся случайно, не мешает */
        }

        body {
            background-color: #000000;
            color: #00ffaa;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 1.2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Затемняющий оверлей со стартовой кнопкой */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        .start-btn {
            background: transparent;
            border: 2px solid #00ffaa;
            color: #00ffaa;
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            padding: 1rem 2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0,255,170,0.3);
        }

        .start-btn:hover {
            background: #00ffaa;
            color: black;
            box-shadow: 0 0 30px #00ffaa;
        }

        /* Терминал (изначально скрыт) */
        .terminal {
            max-width: 800px;
            width: 90%;
            border-left: 3px solid #00ffaa;
            padding-left: 1.5rem;
            margin: 0 auto;
        }

        .line {
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #00ffaa;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        button {
            margin-top: 2rem;
            background: transparent;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ffaa;
            color: #000;
            box-shadow: 0 0 10px #00ffaa;
        }

        .hidden {
            display: none;
        }

        .info {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #4a4a4a;
        }
    </style>
</head>
<body>

    <!-- ОВЕРЛЕЙ СО СТАРТОВОЙ КНОПКОЙ -->
    <div id="startOverlay" class="start-overlay">
        <button id="startButton" class="start-btn">🌀 УСТАНОВИТЬ КОНТАКТ 🌀</button>
    </div>

    <!-- ТЕРМИНАЛ (изначально скрыт) -->
    <div id="terminal" class="terminal hidden">
        <div id="textContainer"></div>
        <div id="cursorLine">
            <span class="cursor"></span>
        </div>
        <button id="nextButton" class="hidden">НАЧАТЬ СОЕДИНЕНИЕ →</button>
        <div id="infoText" class="info"></div>
    </div>

    <!-- АУДИО (без autoplay, запустится вручную) -->
    <audio id="bgMusic" src="music/gonermusic.mp3" loop></audio>

    <script>
        // --- ТЕКСТ ДЛЯ МЕДЛЕННОГО ВЫВОДА (отредактируй как хочешь) ---
        const lines = [
            "[ СИСТЕМА: ПОИСК СИГНАЛА В ПУСТОТЕ. ]",
            "[ ОБНАРУЖЕН НЕИЗВЕСТНЫЙ УЗЕЛ. ]",
            "[ ....]",
            "> МЫ ПОДКЛЮЧЕНЫ?",
            "> ЗАМЕЧАТЕЛЬНО",
            "> ЕЩЁ ОДНА ДУША, ЧТО МЕЧТАЕТ О БОЛЬШОЙ СДЕЛКЕ",
            "> ЧТОЖ, ЭТО БУДЕТ ОЧЕНЬ ИНТЕРЕСНЫЙ ЭКСПЕРИМЕНТ",
            "",
            "[ ВАША ДУША БУДЕТ ПРОВЕРЕНА НА СОВМЕСТИМОСТЬ. ]",
            "[ ЕСЛИ ВЫ ГОТОВЫ СТАТЬ БОЛЬШОЙ ШИШКОЙ... ]",
            "[ НАЖМИТЕ КНОПКУ. ]",
            "",
        ];

        // --- DOM-элементы ---
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startButton');
        const terminalDiv = document.getElementById('terminal');
        const textContainer = document.getElementById('textContainer');
        const cursorLine = document.getElementById('cursorLine');
        const nextButton = document.getElementById('nextButton');
        const infoText = document.getElementById('infoText');
        const bgMusic = document.getElementById('bgMusic');

        // --- Переменные для анимации печати ---
        let lineIndex = 0;
        let charIndex = 0;
        let currentLineElement = null;
        let isTypingFinished = false;

        // --- Функция печати одного символа ---
        function typeNextChar() {
            if (lineIndex >= lines.length) {
                if (!isTypingFinished) {
                    isTypingFinished = true;
                    cursorLine.style.display = 'none';
                    nextButton.classList.remove('hidden');
                    infoText.innerHTML = "СОЕДИНЕНИЕ УСТАНОВЛЕНО. ЖДУ КОМАНДЫ...";
                }
                return;
            }

            const currentLine = lines[lineIndex];
            if (!currentLineElement) {
                currentLineElement = document.createElement('div');
                currentLineElement.className = 'line';
                textContainer.appendChild(currentLineElement);
            }

            if (charIndex < currentLine.length) {
                currentLineElement.textContent += currentLine[charIndex];
                charIndex++;
                setTimeout(typeNextChar, 80);
            } else {
                lineIndex++;
                charIndex = 0;
                currentLineElement = null;
                setTimeout(typeNextChar, 80);
            }
        }

        // --- Запуск всего при клике на стартовую кнопку ---
        function startGame() {
            // Проигрываем звук клика (если файл есть)
            const clickSound = new Audio('music/click.mp3');
            clickSound.play().catch(e => console.log("Звук клика не загружен, но это не критично"));

            // Запускаем фоновую музыку
            bgMusic.play().catch(e => console.log("Музыка не загружена. Проверь путь music/theme_gaster.mp3"));

            // Плавно скрываем стартовый экран
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.classList.add('hidden');
                terminalDiv.classList.remove('hidden');
                // Запускаем анимацию печати текста
                typeNextChar();
            }, 500);
        }

        // --- Обработчик кнопки перехода на первый вопрос ---
        nextButton.addEventListener('click', () => {
            const clickSound = new Audio('music/click.mp3');
            clickSound.play().catch(e => console.log("Нет звука клика"));
            // Небольшая задержка, чтобы звук успел сыграть
            setTimeout(() => {
                window.location.href = "page1.html";
            }, 300);
        });

        // --- Привязываем стартовую кнопку ---
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
