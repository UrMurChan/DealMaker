<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>404 / Пустота</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            background-image: radial-gradient(circle at 30% 20%, #0a0a1a, #000000);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #b0b0c0;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        .toby-dog {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px #aa66cc);
        }
        h1 {
            font-size: 3rem;
            color: #ffaaff;
            text-shadow: 0 0 5px #aa44aa;
        }
        .message {
            margin: 1.5rem 0;
            font-size: 1.1rem;
            border-left: 3px solid #aa66cc;
            padding-left: 1rem;
            text-align: left;
        }
        a {
            color: #aaffaa;
            text-decoration: none;
            border-bottom: 1px dashed #aaffaa;
        }
        a:hover {
            color: #ccffcc;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toby-dog">
        🐕🐾✨
    </div>
    <h1>404</h1>
    <div class="message">
        Этой страницы нет в этом мире.<br>
        Возможно, она затерялась в Пустоте или её съел Спамтон.<br>
        Но ты можешь <a href="/">вернуться к сделке</a> и начать сначала.
    </div>
    <div style="margin-top: 2rem; font-size: 0.8rem;">
        [ made with [🔘] by mystery? ]
    </div>
</div>
</body>
</html>
