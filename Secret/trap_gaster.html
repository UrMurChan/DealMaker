<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>⚠️ СБОЙ GASTER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Wingdings', 'Webdings', 'Courier New', monospace;
            animation: glitchBg 0.15s infinite;
        }

        @keyframes glitchBg {
            0% { background-color: black; }
            10% { background-color: #0a0a2a; }
            20% { background-color: black; }
            30% { background-color: #2a0a0a; }
            40% { background-color: black; }
            100% { background-color: black; }
        }

        .glitch {
            font-size: 4rem;
            font-weight: bold;
            color: #0f0;
            text-align: center;
            animation: glitchText 0.2s infinite;
            margin: 20px;
        }

        @keyframes glitchText {
            0% { text-shadow: -3px 0 red, 3px 0 blue; transform: skew(0deg); }
            25% { text-shadow: 3px 0 red, -3px 0 blue; transform: skew(2deg); }
            50% { text-shadow: -2px 0 blue, 2px 0 red; transform: skew(-2deg); }
            75% { text-shadow: 2px 0 blue, -2px 0 red; transform: skew(1deg); }
            100% { text-shadow: 0 0 8px #0f0; transform: skew(0deg); }
        }

        .message {
            font-size: 1.5rem;
            color: #0f0;
            text-align: center;
            margin: 20px;
            border-left: 2px solid #0f0;
            padding-left: 20px;
            animation: flicker 0.4s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 2px #0f0; }
            100% { opacity: 0.6; text-shadow: 0 0 8px #0f0; }
        }

        .six {
            font-size: 2rem;
            letter-spacing: 10px;
            margin-top: 30px;
        }

        /* шумовая наложение */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.08) 0px, rgba(0,255,0,0.08) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="noise"></div>
<div class="glitch">⚠️ GASTER ⚠️</div>
<div class="message">
    ✦ 6 6 6 ✦<br>
    ВМЕШАТЕЛЬСТВО ИЗ ПУСТОТЫ<br>
    ЭКСПЕРИМЕНТ ПРЕРВАН
</div>
<div class="six">
    6 6 6
</div>

<!-- Звук сбоя (если файл есть, иначе просто закомментируй) -->
<audio id="glitchSound" autoplay>
    <source src="music/glitch.mp3" type="audio/mpeg">
</audio>

<script>
    // Автоматический возврат на index.html через 2 секунды
    setTimeout(() => {
        window.location.replace("index.html");
    }, 4000);

    // Если звук не загружен, чтобы не было ошибки в консоли
    const audio = document.getElementById('glitchSound');
    if (audio) {
        audio.play().catch(e => console.log("Звук сбоя не найден, но это не страшно"));
    }
</script>
<div class="gaster-dance-floor">
    <img src="images/gaster1.gif" class="dance-gif">
    <img src="images/gaster2.gif" class="dance-gif">
	<img src="images/gaster1.gif" class="dance-gif">
    <img src="images/gaster2.gif" class="dance-gif">
	<img src="images/gaster1.gif" class="dance-gif">
    <img src="images/gaster2.gif" class="dance-gif">
</div>

<style>
    .gaster-dance-floor {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 15px;
        z-index: 9999;
        pointer-events: none;
        padding: 5px 0;
    }
    .dance-gif {
        width: 100px;
        height: auto;
    }
</style>
</body>
</html>
